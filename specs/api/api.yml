        - ProfitShop
      summary: 刪除 Partner（admin_only；is_in_use 預檢）
      description: |
        Permission: `manage_options`。
        如該 Partner 仍被現存賣場引用，回 409 `partner_in_use`。
      operationId: deleteProfitPartner
      security:
        - WPNonce: []
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      deleted:
                        type: boolean
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '404':
          description: not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '409':
          description: partner_in_use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/profit-partners/{id}/regenerate-password:
    post:
      tags:
        - ProfitShop
      summary: 重新產生 Partner 密碼（admin_only）
      description: |
        Permission: `manage_options` + 額外 `X-WP-Nonce` 驗證（reviewer follow-up T-4.1，防 CSRF）。
        產生 12 字元 `wp_generate_password`，雜湊存 termmeta，回傳明文（前端必須立即顯示後丟棄）。

        Response header **強制**：
          - `Cache-Control: no-store, no-cache, must-revalidate`
          - `Pragma: no-cache`

        副作用：bump partner 的 `password_changed_at`，所有先前已發出的 token 將失效（Phase 3-D Batch 2）。
      operationId: regenerateProfitPartnerPassword
      security:
        - WPNonce: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 新密碼（裸 payload，與 partner endpoint 慣例一致）
          headers:
            Cache-Control:
              required: true
              schema:
                type: string
                example: 'no-store, no-cache, must-revalidate'
            Pragma:
              required: true
              schema:
                type: string
                example: 'no-cache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegeneratePasswordOutput'
        '403':
          description: 無權限 / nonce 失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '404':
          description: not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  # ────────────────────────────
  # Profit Shop — Migration（§4.7）
  # ────────────────────────────

  /power-shop/profit-migration/legacy-shops:
    get:
      tags:
        - ProfitShop
      summary: 列出可遷入的 legacy 一頁商店（admin_only）
      operationId: listImportableLegacyShops
      security:
        - WPNonce: []
      responses:
        '200':
          description: legacy shops 清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LegacyShopRef'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/profit-migration/import:
    post:
      tags:
        - ProfitShop
      summary: 匯入 legacy 一頁商店（admin_only，強制 partner_term_id）
      operationId: importLegacyShop
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - legacy_id
                - partner_term_id
              properties:
                legacy_id:
                  type: integer
                partner_term_id:
                  type: integer
                  description: 必填；匯入的 ProfitShop 必須掛在某個 partner 下
      responses:
        '201':
          description: 匯入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/ProfitShopOutput'
        '400':
          description: validation_failed（缺 legacy_id / partner_term_id）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '404':
          description: not_found（legacy 或 partner 不存在）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '422':
          description: legacy_unimportable（含 reason）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  # ────────────────────────────
  # Profit Shop — Settings（§4.8）
  # ────────────────────────────

  /power-shop/profit-settings:
    get:
      tags:
        - ProfitShop
      summary: 取得全域設定（admin_only）
      operationId: getProfitSettings
      security:
        - WPNonce: []
      responses:
        '200':
          description: 設定
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/SettingsDto'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

    put:
      tags:
        - ProfitShop
      summary: 更新全域設定（admin_only，含 SlugConflictDetector + flush_rules）
      description: |
        Permission: `manage_options`。
        更新 rewrite_slug / report_slug 時會經 `SlugConflictDetector` 5 類衝突檢查，
        通過後 `flush_rewrite_rules` 重建 permalink 結構。
      operationId: updateProfitSettings
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsDto'
      responses:
        '200':
          description: 更新成功（回傳已 persist 的設定）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/SettingsDto'
        '400':
          description: validation_failed（slug 格式錯誤）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '409':
          description: slug_conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/profit-settings/reset:
    post:
      tags:
        - ProfitShop
      summary: 還原全域設定預設值（admin_only）
      operationId: resetProfitSettings
      security:
        - WPNonce: []
      responses:
        '200':
          description: 已還原為預設值
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/SettingsDto'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  # ────────────────────────────
  # Profit Shop — Partner Auth（§4.4，public + partner_token）
  #
  # 重要慣例（與 admin endpoint 不同）：
  #   - Response **不裹** `{code, data}`，body 直接是 payload
  #   - 認證走 partner_token（X-Partner-Token / Bearer / Cookie 三條路徑）
  #   - login 設置 Cookie：HttpOnly + Secure + SameSite=Lax + Path=/wp-json/power-shop/ + Max-Age=3600
  # ────────────────────────────

  /power-shop/partner-auth/login:
    post:
      tags:
        - ProfitShopPartnerAuth
      summary: Partner 登入（public）
      description: |
        Permission: public。
        Body 欄位 `password` 不經 `sanitize_text_field`（保留密碼字面值），
        以 `wp_check_password` 比對 termmeta 雜湊。

        **Rate limit**：per-slug + per-IP，5 次失敗鎖 15 分鐘（reviewer M-2 / L-3）。
        達上限回 429 `rate_limited` + `Retry-After` header。

        **Set-Cookie**：
          - 名稱 `profit_partner_token`
          - 屬性 `HttpOnly; Secure; SameSite=Lax; Path=/wp-json/power-shop/; Max-Age=3600`

        失敗回應對未知 slug **不** record_failure（避免 timing oracle 暴露 slug 存在性）。
      operationId: partnerLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerLoginInput'
      responses:
        '200':
          description: 登入成功（裸 payload，附 Set-Cookie）
          headers:
            Set-Cookie:
              required: true
              schema:
                type: string
                example: 'profit_partner_token=abc...; HttpOnly; Secure; SameSite=Lax; Path=/wp-json/power-shop/; Max-Age=3600'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerLoginOutput'
        '400':
          description: validation_failed（slug / password 為空）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '401':
          description: unauthorized（InvalidCredentials；統一回應，不分 slug 不存在 vs 密碼錯誤）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '429':
          description: rate_limited（含 retry_after + Retry-After header）
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/partner-auth/logout:
    post:
      tags:
        - ProfitShopPartnerAuth
      summary: Partner 登出（public，idempotent）
      description: |
        Permission: public（即使無 token 也回 200，行為 idempotent）。
        若有 token 會 revoke transient + 寫 Set-Cookie `Max-Age=0` 清 Cookie。
      operationId: partnerLogout
      security: []
      parameters:
        - $ref: '#/components/parameters/PartnerToken'
        - $ref: '#/components/parameters/AuthBearer'
        - $ref: '#/components/parameters/PartnerCookie'
      responses:
        '200':
          description: 已登出（裸 payload）
          headers:
            Set-Cookie:
              schema:
                type: string
                example: 'profit_partner_token=; HttpOnly; Secure; SameSite=Lax; Path=/wp-json/power-shop/; Max-Age=0'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutOutput'

  /power-shop/partner-auth/me:
    get:
      tags:
        - ProfitShopPartnerAuth
      summary: 取得當前 Partner 資訊（partner_token）
      operationId: partnerMe
      security:
        - PartnerToken: []
        - PartnerBearer: []
        - PartnerCookie: []
      responses:
        '200':
          description: Partner 公開資訊（裸 payload）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMeOutput'
        '401':
          description: unauthorized（token 缺失 / 已過期 / 已 revoke）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  # ────────────────────────────
  # Profit Shop — Partner Reports（§4.5，partner_token only）
  #
  # 安全 invariant：
  #   - partner_term_id 鎖死於 token，permission_callback 寫入 `_partner_term_id`
  #   - **永不**從 query string 讀 partner_term_id（防 cross-partner 越權）
  #   - WP_REST_Request::set_param 會覆寫所有 buckets 中的同名 key，
  #     即使 attacker 帶 `?_partner_term_id=999` 也會被覆寫為 token 解出的真值
  # ────────────────────────────

  /power-shop/partner-reports/kpi:
    get:
      tags:
        - ProfitShopPartnerReports
      summary: Partner KPI 報表
      description: |
        partner_term_id 由 token 鎖死，**禁止**作為 query parameter 出現。
      operationId: getPartnerKpi
      security:
        - PartnerToken: []
        - PartnerBearer: []
        - PartnerCookie: []
      parameters:
        - name: date_start
          in: query
          schema:
            type: integer
            description: unix timestamp 起點
        - name: date_end
          in: query
          schema:
            type: integer
            description: unix timestamp 終點
        - name: shop_ids
          in: query
          description: 逗號分隔賣場 ID（可選；屬於同一 partner 的 shop）
          schema:
            type: string
        - name: statuses
          in: query
          description: 逗號分隔狀態（pending / paid / refunded）
          schema:
            type: string
      responses:
        '200':
          description: KPI（裸 payload）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiOutput'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/partner-reports/trend:
    get:
      tags:
        - ProfitShopPartnerReports
      summary: Partner 趨勢報表
      description: |
        partner_term_id 由 token 鎖死，**禁止**作為 query parameter。
      operationId: getPartnerTrend
      security:
        - PartnerToken: []
        - PartnerBearer: []
        - PartnerCookie: []
      parameters:
        - name: interval
          in: query
          schema:
            type: string
            enum:
              - day
              - week
              - month
            default: day
        - name: date_start
          in: query
          schema:
            type: integer
        - name: date_end
          in: query
          schema:
            type: integer
        - name: shop_ids
          in: query
          schema:
            type: string
        - name: statuses
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 趨勢序列（裸 payload）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendOutput'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/partner-reports/settlements:
    get:
      tags:
        - ProfitShopPartnerReports
      summary: Partner 結算列表
      description: |
        partner_term_id 由 token 鎖死，**禁止**作為 query parameter。
        page 上限 cap=10000（reviewer LOW-T5-2，防 OFFSET 巨大查詢拖庫）。
      operationId: listPartnerSettlements
      security:
        - PartnerToken: []
        - PartnerBearer: []
        - PartnerCookie: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: date_start
          in: query
          schema:
            type: integer
        - name: date_end
          in: query
          schema:
            type: integer
        - name: shop_ids
          in: query
          schema:
            type: string
        - name: statuses
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 結算列表 + 分頁中介資料（裸 payload）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementListOutput'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
