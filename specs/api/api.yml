openapi: 3.0.0
info:
  title: Power Shop API
  version: 2.0.0
  description: >-
    Power Shop WordPress Plugin REST API。
    涵蓋自有端點（power-shop namespace）、WooCommerce REST API（wc/v3）、
    WordPress REST API（wp/v2）。認證使用 X-WP-Nonce header 搭配 WordPress Cookie。

servers:
  - url: /wp-json
    description: WordPress REST API 基礎路徑

security:
  - WPNonce: []

components:
  securitySchemes:
    WPNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST API Nonce，搭配 Cookie 認證使用。
    PartnerToken:
      type: apiKey
      in: header
      name: X-Partner-Token
      description: |
        Partner token（spec §4.5 / §6.3）。優先級鏈（高 → 低）：
          1. `X-Partner-Token: {token}`
          2. `Authorization: Bearer {token}`
          3. Cookie `profit_partner_token`
        三選一即可，三條路徑全部由同一個 partner_token_permission callback 解析。
        驗證後 partner_term_id 鎖死於 caller，永不從 query string 讀。
    PartnerBearer:
      type: http
      scheme: bearer
      bearerFormat: PartnerToken
    PartnerCookie:
      type: apiKey
      in: cookie
      name: profit_partner_token

  schemas:

    Address:
      type: object
      description: 地址物件（帳單 / 配送）
      properties:
        first_name:
          type: string
        last_name:
          type: string
        company:
          type: string
        address_1:
          type: string
        address_2:
          type: string
        city:
          type: string
        state:
          type: string
        postcode:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 國家代碼
        email:
          type: string
          format: email
          description: 僅帳單地址使用
        phone:
          type: string
          description: 僅帳單地址使用

    MetaData:
      type: object
      description: WooCommerce / WordPress Meta 資料
      properties:
        id:
          type: integer
          readOnly: true
        key:
          type: string
        value:
          description: 任意型別（string / number / object / array）

    Image:
      type: object
      description: 圖片物件
      properties:
        id:
          type: integer
        src:
          type: string
          format: uri
        name:
          type: string
        alt:
          type: string

    OrderItem:
      type: object
      description: 訂單商品項目
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        product_id:
          type: integer
        variation_id:
          type: integer
          default: 0
        quantity:
          type: integer
          minimum: 1
        tax_class:
          type: string
        subtotal:
          type: string
          description: 商品小計（不含稅）
        subtotal_tax:
          type: string
        total:
          type: string
          description: 商品總計（不含稅，含折扣）
        total_tax:
          type: string
        sku:
          type: string
          readOnly: true
        price:
          type: number
          readOnly: true
        meta_data:
          type: array
          items:
            $ref: '#/components/schemas/MetaData'

    Order:
      type: object
      description: 訂單
      properties:
        id:
          type: integer
          readOnly: true
        number:
          type: string
          readOnly: true
          description: 訂單顯示編號，如 #1001
        status:
          type: string
          enum:
            - pending
            - processing
            - on-hold
            - completed
            - cancelled
            - refunded
            - failed
          default: pending
        customer_id:
          type: integer
          nullable: true
          description: 0 表示訪客訂單
        billing:
          $ref: '#/components/schemas/Address'
        shipping:
          $ref: '#/components/schemas/Address'
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total:
          type: string
          readOnly: true
        subtotal:
          type: string
          readOnly: true
        total_tax:
          type: string
          readOnly: true
        shipping_total:
          type: string
          readOnly: true
        discount_total:
          type: string
          readOnly: true
        payment_method:
          type: string
        payment_method_title:
          type: string
        transaction_id:
          type: string
        date_created:
          type: string
          format: date-time
          readOnly: true
        date_modified:
          type: string
          format: date-time
          readOnly: true
        meta_data:
          type: array
          items:
            $ref: '#/components/schemas/MetaData'

    OrderNote:
      type: object
      description: 訂單備註
      properties:
        id:
          type: integer
          readOnly: true
        note:
          type: string
        customer_note:
          type: boolean
          default: false
          description: true 表示顯示給顧客並觸發通知 email
        author:
          type: string
          readOnly: true
        date_created:
          type: string
          format: date-time
          readOnly: true

    VariationAttribute:
      type: object
      description: 變體屬性值
      properties:
        name:
          type: string
        option:
          type: string

    ProductAttribute:
      type: object
      description: 商品屬性
      properties:
        id:
          type: integer
          default: 0
        name:
          type: string
        position:
          type: integer
          default: 0
        visible:
          type: boolean
          default: true
        variation:
          type: boolean
          default: false
        options:
          type: array
          items:
            type: string

    CategoryRef:
      type: object
      description: 分類參照
      properties:
        id:
          type: integer
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true

    TagRef:
      type: object
      description: 標籤參照
      properties:
        id:
          type: integer
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true

    Product:
      type: object
      description: 商品
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          enum:
            - simple
            - variable
            - grouped
            - external
            - subscription
            - variable-subscription
          default: simple
        status:
          type: string
          enum:
            - publish
            - draft
            - trash
          default: draft
        description:
          type: string
        short_description:
          type: string
        sku:
          type: string
        gtin:
          type: string
        regular_price:
          type: string
          description: 格式為數字字串，如 "299.00"；regular_price >= 0
        sale_price:
          type: string
          description: sale_price <= regular_price；空字串表示無特價
        date_on_sale_from:
          type: string
          format: date-time
          nullable: true
        date_on_sale_to:
          type: string
          format: date-time
          nullable: true
        manage_stock:
          type: boolean
          default: false
        stock_quantity:
          type: integer
          nullable: true
        stock_status:
          type: string
          enum:
            - instock
            - outofstock
            - onbackorder
          default: instock
        backorders:
          type: string
          enum:
            - 'no'
            - notify
            - 'yes'
          default: 'no'
        low_stock_amount:
          type: integer
          nullable: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryRef'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagRef'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ProductAttribute'
        variations:
          type: array
          items:
            type: integer
          readOnly: true
          description: 變體 ID 陣列（variable 商品，唯讀）
        upsell_ids:
          type: array
          items:
            type: integer
        cross_sell_ids:
          type: array
          items:
            type: integer
        grouped_products:
          type: array
          items:
            type: integer
          description: grouped 商品子項 ID
        purchase_note:
          type: string
        menu_order:
          type: integer
          default: 0
        external_url:
          type: string
          description: external 商品用
        button_text:
          type: string
          description: external 商品按鈕文字
        meta_data:
          type: array
          items:
            $ref: '#/components/schemas/MetaData'

    ProductVariation:
      type: object
      description: 商品變體
      properties:
        id:
          type: integer
          readOnly: true
        parent_id:
          type: integer
          readOnly: true
        sku:
          type: string
        regular_price:
          type: string
        sale_price:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - publish
            - private
          default: publish
        manage_stock:
          type: boolean
          default: false
        stock_quantity:
          type: integer
          nullable: true
        stock_status:
          type: string
          enum:
            - instock
            - outofstock
            - onbackorder
          default: instock
        image:
          $ref: '#/components/schemas/Image'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/VariationAttribute'
          description: 對應父商品 variation=true 的所有屬性
        meta_data:
          type: array
          items:
            $ref: '#/components/schemas/MetaData'

    ProductCategory:
      type: object
      description: 商品分類
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        slug:
          type: string
        parent:
          type: integer
          default: 0
          description: 0 表示頂層分類；自我參照
        description:
          type: string
        image:
          $ref: '#/components/schemas/Image'
        count:
          type: integer
          readOnly: true
          description: 該分類下商品數量（唯讀）
        menu_order:
          type: integer
          default: 0

    Customer:
      type: object
      description: 顧客
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        role:
          type: string
          readOnly: true
          default: customer
        billing:
          $ref: '#/components/schemas/Address'
        shipping:
          $ref: '#/components/schemas/Address'
        is_paying_customer:
          type: boolean
          readOnly: true
          default: false
        orders_count:
          type: integer
          readOnly: true
          default: 0
        total_spent:
          type: string
          readOnly: true
          description: 總消費金額，格式為數字字串
        last_order:
          type: object
          nullable: true
          readOnly: true
          properties:
            id:
              type: integer
            date:
              type: string
              format: date-time
        avatar_url:
          type: string
          format: uri
          readOnly: true
        date_created:
          type: string
          format: date-time
          readOnly: true
        date_modified:
          type: string
          format: date-time
          readOnly: true
        meta_data:
          type: array
          items:
            $ref: '#/components/schemas/MetaData'

    CustomerNote:
      type: object
      description: 顧客聯繫備註（Power Shop 自有）
      properties:
        id:
          type: integer
          readOnly: true
        customer_id:
          type: integer
          readOnly: true
        author_id:
          type: integer
          description: 建立備註的操作者 WP User ID
        author_name:
          type: string
          readOnly: true
        content:
          type: string
        date_created:
          type: string
          format: date-time
          readOnly: true

    DashboardStats:
      type: object
      description: Dashboard KPI 統計
      properties:
        period:
          type: string
          enum:
            - today
            - yesterday
            - week
            - month
            - year
            - custom
        date_start:
          type: string
          format: date
        date_end:
          type: string
          format: date
        total_sales:
          type: number
          format: double
          description: 總銷售額
        total_orders:
          type: integer
          description: 總訂單數
        total_customers:
          type: integer
          description: 新增顧客數
        average_order_value:
          type: number
          format: double
          description: 平均訂單金額
        net_revenue:
          type: number
          format: double
          description: 淨營收（扣除退款）
        refund_total:
          type: number
          format: double
          description: 退款總額

    LeaderboardRow:
      type: object
      description: 排行榜單筆資料
      properties:
        name:
          type: string
        count:
          type: integer
        total:
          type: number
          format: double

    DashboardLeaderboard:
      type: object
      description: Dashboard 排行榜
      properties:
        top_products:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardRow'
          description: 熱銷商品排行
        top_customers:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardRow'
          description: 高消費顧客排行
        top_categories:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardRow'
          description: 熱門分類排行

    TrendDataPoint:
      type: object
      description: 趨勢圖資料點
      properties:
        date:
          type: string
          format: date
        revenue:
          type: number
          format: double
        orders:
          type: integer

    DashboardTrend:
      type: object
      description: Dashboard 趨勢圖資料
      properties:
        period:
          type: string
        interval:
          type: string
          enum:
            - day
            - week
            - month
        data:
          type: array
          items:
            $ref: '#/components/schemas/TrendDataPoint'

    RevenueReport:
      type: object
      description: 營收分析報表
      properties:
        period:
          type: string
        date_start:
          type: string
          format: date
        date_end:
          type: string
          format: date
        interval:
          type: string
          enum:
            - day
            - week
            - month
        totals:
          type: object
          properties:
            gross_revenue:
              type: number
              format: double
            net_revenue:
              type: number
              format: double
            refunds:
              type: number
              format: double
            taxes:
              type: number
              format: double
            shipping:
              type: number
              format: double
            orders:
              type: integer
        intervals:
          type: array
          items:
            $ref: '#/components/schemas/TrendDataPoint'

    BatchOrdersRequest:
      type: object
      description: 批量訂單操作請求
      properties:
        create:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        update:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        delete:
          type: array
          items:
            type: integer
          description: 要刪除的訂單 ID 陣列

    BatchVariationsRequest:
      type: object
      description: 批量商品變體操作請求
      properties:
        create:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariation'
        update:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariation'
        delete:
          type: array
          items:
            type: integer

    ErrorResponse:
      type: object
      description: 錯誤回應
      properties:
        code:
          type: string
          description: 錯誤代碼
        message:
          type: string
          description: 錯誤訊息
        data:
          type: object
          properties:
            status:
              type: integer
              description: HTTP 狀態碼

    # ────────────────────────────
    # Profit Shop schemas
    # ────────────────────────────

    ProfitShopExceptionError:
      type: object
      description: |
        Profit Shop Domain Exception 對映後的錯誤回應（由 ExceptionMapper 產出）。

        對映表（spec §7.1 / §7.2 / §7.3）：
          - 404 not_found: ProfitShopNotFound / PartnerNotFound / ProductNotFound
          - 404 product_not_in_shop: ProductNotInShop
          - 400 validation_failed: InvalidPriceOverride / InvalidProfitRate / InvalidPartnerSlug / InvalidVariation / InvalidShopMode + fallback DomainException
          - 401 unauthorized: InvalidCredentials
          - 403 forbidden: Forbidden
          - 409 slug_conflict: SlugConflictException（含 conflicts 陣列）
          - 409 partner_in_use: PartnerStillInUseException
          - 409 product_already_in_shop: ProductAlreadyInShop
          - 422 invalid_state_transition: InvalidStatusTransition
          - 422 legacy_unimportable: LegacyShopNotImportable（含 reason）
          - 429 rate_limited: TooManyAttempts / RateLimitExceeded（含 retry_after + Retry-After header）
          - 500 internal_error: PersistenceFailure / 其它 Throwable（含 error_id；生產環境 message 遮蔽）
      properties:
        code:
          type: string
          enum:
            - not_found
            - product_not_in_shop
            - validation_failed
            - unauthorized
            - forbidden
            - slug_conflict
            - partner_in_use
            - product_already_in_shop
            - invalid_state_transition
            - legacy_unimportable
            - rate_limited
            - internal_error
        message:
          type: string
        conflicts:
          type: array
          description: code=slug_conflict 時附加，描述每筆衝突來源
          items:
            $ref: '#/components/schemas/SlugConflict'
        reason:
          type: string
          description: code=legacy_unimportable 時附加（reviewer L-1 / Phase 3-B observation）
        retry_after:
          type: integer
          description: code=rate_limited 時附加，秒數（同步 Retry-After header）
        error_id:
          type: string
          description: code=internal_error 時附加，格式 PS-{ts}-{rand}
      required:
        - code
        - message

    SlugConflict:
      type: object
      description: Slug 衝突來源（spec §6.11，5 類）
      properties:
        conflict_kind:
          type: string
          description: 衝突類型 machine code（profit_shop / product / page / term / reserved）
        conflicting_slug:
          type: string
        conflicting_id:
          type: integer
          nullable: true
        conflicting_label:
          type: string
          description: 人類可讀的衝突資源名稱
      required:
        - conflict_kind
        - conflicting_slug
        - conflicting_label

    OverrideItemInput:
      type: object
      description: 賣場商品覆寫項目（input 形式）
      properties:
        product_id:
          type: integer
        variation_id:
          type: integer
          default: 0
        price_override:
          type: integer
          nullable: true
          description: 售價覆寫（單位：元；null 表示沿用原價）
        inflated_count:
          type: integer
          default: 0
          description: 浮報數量（fake count，不影響庫存）

    OverrideItemOutput:
      allOf:
        - $ref: '#/components/schemas/OverrideItemInput'
        - type: object
          properties:
            sku:
              type: string
              readOnly: true
            name:
              type: string
              readOnly: true

    ProfitShopInput:
      type: object
      description: |
        分潤賣場 Admin 寫入 DTO（建立 / 更新）。
        對應 PHP class `J7\PowerShop\Domains\ProfitShop\Application\DTO\ProfitShopInput`。
      properties:
        id:
          type: integer
          nullable: true
          description: 建立時為 null
        title:
          type: string
        slug:
          type: string
          description: 將經 SlugConflictDetector 5 類衝突檢查（spec §6.11）
        status:
          type: string
          enum:
            - publish
            - draft
            - trash
          default: draft
        mode:
          type: string
          enum:
            - page
            - shortcode
          default: page
        partner_term_id:
          type: integer
          description: 對應 profit_partner term ID
        rate:
          type: integer
          minimum: 0
          maximum: 100
          description: 分潤比例（%）
        items:
          type: array
          items:
            $ref: '#/components/schemas/OverrideItemInput'
        settings:
          type: object
          additionalProperties: true
      required:
        - title
        - slug
        - partner_term_id
        - rate

    ProfitShopOutput:
      type: object
      description: 分潤賣場讀取 DTO
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        status:
          type: string
          enum:
            - publish
            - draft
            - trash
        mode:
          type: string
          enum:
            - page
            - shortcode
        partner_term_id:
          type: integer
        rate:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OverrideItemOutput'
        settings:
          type: object
          additionalProperties: true
        created_at:
          type: string
          description: Y-m-d H:i:s
        updated_at:
          type: string
          description: Y-m-d H:i:s
      required:
        - id
        - title
        - slug
        - status
        - mode
        - partner_term_id
        - rate
        - items
        - settings
        - created_at
        - updated_at

    PartnerInput:
      type: object
      description: |
        Partner 寫入 DTO（建立 / 更新）。
        **@internal**：含明文密碼，僅出現於 request；**禁止**回傳於 response（
        PartnerInput::to_array() 不可序列化到 REST response，對外請使用 PartnerOutput）。
      properties:
        id:
          type: integer
          nullable: true
          description: 建立時為 null
        name:
          type: string
        slug:
          type: string
          description: Partner slug（唯一）
        contact_email:
          type: string
          format: email
          nullable: true
        password:
          type: string
          format: password
          nullable: true
          description: 明文密碼（null 代表不變更）；server 端會以 wp_hash_password 雜湊後存 termmeta
      required:
        - name
        - slug

    PartnerOutput:
      type: object
      description: Partner 讀取 DTO（不含密碼）
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        contact_email:
          type: string
          format: email
          nullable: true
        created_at:
          type: string
          description: Y-m-d H:i:s
      required:
        - id
        - name
        - slug
        - created_at

    SettingsDto:
      type: object
      description: |
        Profit Shop 全域設定 DTO（spec §6.5）。
        rewrite_slug / report_slug 須符合 `^[a-z0-9][a-z0-9\-]{0,29}$`，
        會經 sanitize_title 正規化；違反格式拋 400 validation_failed。
      properties:
        rewrite_slug:
          type: string
          minLength: 1
          maxLength: 30
          pattern: '^[a-z0-9][a-z0-9\-]{0,29}$'
          default: shop
        report_slug:
          type: string
          minLength: 1
          maxLength: 30
          pattern: '^[a-z0-9][a-z0-9\-]{0,29}$'
          default: report
        default_rate:
          type: integer
          minimum: 0
          maximum: 100
          default: 10
          description: 超出範圍將被 clamp
        page_template:
          type: string
          default: default
      required:
        - rewrite_slug
        - report_slug
        - default_rate
        - page_template

    LegacyShopRef:
      type: object
      description: 可遷入的 legacy 一頁商店參照（profit-migration/legacy-shops 列表項）
      properties:
        legacy_id:
          type: integer
        title:
          type: string
        slug:
          type: string
        importable:
          type: boolean
          description: false 時 reason 會說明原因

    PartnerLoginInput:
      type: object
      description: Partner 登入請求（spec §6.3 / §7）
      properties:
        slug:
          type: string
        password:
          type: string
          format: password
      required:
        - slug
        - password

    PartnerLoginOutput:
      type: object
      description: |
        Partner 登入回應。
        **不裹** `{code, data}`（spec §4.4，partner endpoint 慣例差異）。
        `expires_at` 為 unix timestamp 字串化（前端 parseInt 即得秒數）。
      properties:
        token:
          type: string
          description: Partner token；後續 request 透過 X-Partner-Token / Bearer / Cookie 任一帶入
        expires_at:
          type: string
          description: unix timestamp 字串化（如 "1746623200"）
        partner_id:
          type: integer
        partner_name:
          type: string
      required:
        - token
        - expires_at
        - partner_id
        - partner_name

    PartnerMeOutput:
      type: object
      description: Partner /me 端點回應（裸 payload，不裹 code/data）
      properties:
        partner_id:
          type: integer
        partner_name:
          type: string
        partner_slug:
          type: string
        contact_email:
          type: string
          format: email
          nullable: true
      required:
        - partner_id
        - partner_name
        - partner_slug

    KpiOutput:
      type: object
      description: |
        Partner KPI 報表（spec §6 / §7）。
        所有金額欄位採字串保存以保留小數精度。
      properties:
        total_sales:
          type: string
          description: 總銷售額（如 "12345.67"）
        profit_pending:
          type: string
          description: 待結算分潤
        profit_paid:
          type: string
          description: 已結算分潤
        profit_refunded:
          type: string
          description: 已退款分潤
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
      required:
        - total_sales
        - profit_pending
        - profit_paid
        - profit_refunded
        - period_start
        - period_end

    TrendPoint:
      type: object
      description: 趨勢報表單一時間點
      properties:
        date:
          type: string
          format: date
        profit:
          type: string
          description: 該時間點分潤金額（字串保精度）
        sales:
          type: string
          description: 該時間點銷售金額（字串保精度）

    TrendOutput:
      type: object
      description: Partner 趨勢報表（裸 payload）
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'
      required:
        - series

    SettlementListItem:
      type: object
      description: Settlement 結算記錄單筆
      properties:
        order_id:
          type: integer
        order_item_id:
          type: integer
        product_id:
          type: integer
        shop_id:
          type: integer
        sale_amount:
          type: string
        profit_amount:
          type: string
        status:
          type: string
          enum:
            - pending
            - paid
            - refunded
        created_at:
          type: string
          format: date-time

    SettlementListOutput:
      type: object
      description: Partner 結算列表（裸 payload，含分頁中介資料）
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SettlementListItem'
        total:
          type: integer
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
      required:
        - items
        - total
        - page
        - per_page

    SlugValidationOutput:
      type: object
      description: |
        Slug 驗證結果（GET /profit-shops/validate-slug）。
        available=true 時 conflicts 為空陣列；available=false 時列出所有衝突來源。
      properties:
        slug:
          type: string
        available:
          type: boolean
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/SlugConflict'
      required:
        - slug
        - available
        - conflicts

    RegeneratePasswordOutput:
      type: object
      description: |
        重新產生 Partner 密碼回應（裸 payload）。
        Response 強制 `Cache-Control: no-store, no-cache, must-revalidate` + `Pragma: no-cache`，
        防範密碼明文被 proxy / browser 快取。
      properties:
        partner_id:
          type: integer
        password:
          type: string
          description: 新密碼明文（12 字元 wp_generate_password；前端必須立即顯示後丟棄）
      required:
        - partner_id
        - password

    LogoutOutput:
      type: object
      description: 登出回應（裸 payload，idempotent）
      properties:
        logged_out:
          type: boolean
      required:
        - logged_out

  parameters:
    PartnerToken:
      name: X-Partner-Token
      in: header
      description: |
        Partner token（spec §4.5 / §6.3）。
        三條讀取路徑優先級鏈（高 → 低）：
          1. `X-Partner-Token`
          2. `Authorization: Bearer {token}`
          3. Cookie `profit_partner_token`（瀏覽器自動帶）
        三選一即可。SPA 推薦走 X-Partner-Token（與 X-WP-Nonce 對稱）。
      required: false
      schema:
        type: string
    AuthBearer:
      name: Authorization
      in: header
      description: '`Bearer {token}`（partner_token 三條路徑之一）'
      required: false
      schema:
        type: string
    PartnerCookie:
      name: Cookie
      in: header
      description: |
        `profit_partner_token={token}`；Set-Cookie 屬性：
        HttpOnly + Secure + SameSite=Lax + Path=/wp-json/power-shop/ + Max-Age=3600。
      required: false
      schema:
        type: string

paths:

  # ────────────────────────────
  # Dashboard
  # ────────────────────────────

  /power-shop/reports/dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: 查詢 Dashboard KPI 統計
      operationId: getDashboardStats
      security:
        - WPNonce: []
      parameters:
        - name: period
          in: query
          description: 統計期間
          schema:
            type: string
            enum:
              - today
              - yesterday
              - week
              - month
              - year
              - custom
            default: month
        - name: date_start
          in: query
          description: 自訂期間起始日（period=custom 時使用）
          schema:
            type: string
            format: date
        - name: date_end
          in: query
          description: 自訂期間結束日（period=custom 時使用）
          schema:
            type: string
            format: date
      responses:
        '200':
          description: KPI 統計資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /power-shop/reports/dashboard/leaderboard:
    get:
      tags:
        - Dashboard
      summary: 查詢排行榜
      operationId: getDashboardLeaderboard
      security:
        - WPNonce: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum:
              - today
              - yesterday
              - week
              - month
              - year
              - custom
            default: month
        - name: date_start
          in: query
          schema:
            type: string
            format: date
        - name: date_end
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          description: 各排行榜最大回傳筆數
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: 排行榜資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardLeaderboard'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /power-shop/reports/dashboard/trend:
    get:
      tags:
        - Dashboard
      summary: 查詢營收趨勢圖表
      operationId: getDashboardTrend
      security:
        - WPNonce: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum:
              - today
              - yesterday
              - week
              - month
              - year
              - custom
            default: month
        - name: interval
          in: query
          description: 資料分組粒度
          schema:
            type: string
            enum:
              - day
              - week
              - month
            default: day
        - name: date_start
          in: query
          schema:
            type: string
            format: date
        - name: date_end
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 趨勢圖表資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTrend'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────
  # Orders
  # ────────────────────────────

  /wc/v3/orders:
    get:
      tags:
        - Orders
      summary: 查詢訂單列表
      operationId: listOrders
      security:
        - WPNonce: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: search
          in: query
          description: 搜尋訂單編號、顧客姓名、Email
          schema:
            type: string
        - name: status
          in: query
          description: 篩選訂單狀態
          schema:
            type: string
            enum:
              - pending
              - processing
              - on-hold
              - completed
              - cancelled
              - refunded
              - failed
              - any
        - name: customer
          in: query
          description: 篩選特定顧客（customer_id）
          schema:
            type: integer
        - name: date_min
          in: query
          description: 建立日期下限（ISO 8601 date）
          schema:
            type: string
            format: date
        - name: date_max
          in: query
          description: 建立日期上限（ISO 8601 date）
          schema:
            type: string
            format: date
        - name: orderby
          in: query
          schema:
            type: string
            enum:
              - date
              - id
              - include
              - title
              - slug
            default: date
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: 訂單列表
          headers:
            X-WP-Total:
              description: 符合條件的總筆數
              schema:
                type: integer
            X-WP-TotalPages:
              description: 總頁數
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Orders
      summary: 建立訂單
      operationId: createOrder
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201':
          description: 訂單建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wc/v3/orders/batch:
    post:
      tags:
        - Orders
      summary: 批量刪除訂單
      operationId: batchDeleteOrders
      description: 透過 delete 陣列批量刪除訂單（WooCommerce batch API）
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOrdersRequest'
      responses:
        '200':
          description: 批量操作結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  create:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  update:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  delete:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wc/v3/orders/{id}:
    put:
      tags:
        - Orders
      summary: 更新訂單狀態或地址
      operationId: updateOrder
      security:
        - WPNonce: []
      parameters:
        - name: id
          in: path
          required: true
          description: 訂單 ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '200':
          description: 訂單更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 訂單不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wc/v3/orders/{id}/notes:
    post:
      tags:
        - Orders
      summary: 新增訂單備註
      operationId: createOrderNote
      security:
        - WPNonce: []
      parameters:
        - name: id
          in: path
          required: true
          description: 訂單 ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - note
              properties:
                note:
                  type: string
                  description: 備註內容
                customer_note:
                  type: boolean
                  default: false
                  description: 是否顯示給顧客
      responses:
        '201':
          description: 備註新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderNote'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 訂單不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────
  # Products
  # ────────────────────────────

  /wc/v3/products/categories:
    get:
      tags:
        - Products
      summary: 查詢商品分類列表
      operationId: listProductCategories
      security:
        - WPNonce: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: parent
          in: query
          description: 篩選指定父分類的子分類（0 = 頂層）
          schema:
            type: integer
        - name: hide_empty
          in: query
          description: 隱藏無商品的分類
          schema:
            type: boolean
            default: false
        - name: orderby
          in: query
          schema:
            type: string
            enum:
              - id
              - include
              - name
              - slug
              - term_group
              - description
              - count
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: 商品分類列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductCategory'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Products
      summary: 新增商品分類
      operationId: createProductCategory
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCategory'
      responses:
        '201':
          description: 分類建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategory'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wc/v3/products:
    get:
      tags:
        - Products
      summary: 查詢商品列表
      operationId: listProducts
      security:
        - WPNonce: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - publish
              - draft
              - trash
              - any
        - name: type
          in: query
          schema:
            type: string
            enum:
              - simple
              - variable
              - grouped
              - external
              - subscription
              - variable-subscription
        - name: category
          in: query
          description: 分類 slug 或 ID
          schema:
            type: string
        - name: tag
          in: query
          description: 標籤 slug 或 ID
          schema:
            type: string
        - name: sku
          in: query
          schema:
            type: string
        - name: stock_status
          in: query
          schema:
            type: string
            enum:
              - instock
              - outofstock
              - onbackorder
        - name: orderby
          in: query
          schema:
            type: string
            enum:
              - date
              - id
              - include
              - title
              - slug
              - price
              - popularity
              - rating
            default: date
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: 商品列表
          headers:
            X-WP-Total:
              schema:
                type: integer
            X-WP-TotalPages:
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Products
      summary: 建立草稿商品
      operationId: createProduct
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: 商品建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wc/v3/products/{id}:
    put:
      tags:
        - Products
      summary: 儲存商品資料
      operationId: updateProduct
      security:
        - WPNonce: []
      parameters:
        - name: id
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: 商品更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 商品不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wc/v3/products/{id}/variations/batch:
    post:
      tags:
        - Products
      summary: 自動生成/批量管理商品變體
      operationId: batchProductVariations
      description: >-
        透過笛卡爾積自動生成所有屬性組合的變體，或批量更新 / 刪除現有變體。
