                properties:
                  create:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariation'
                  update:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariation'
                  delete:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariation'
        '400':
