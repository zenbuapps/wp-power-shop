  # ════════════════════════════════════════════════════════════════
  # Profit Shop（spec §4.1 / §4.2 / §4.4 / §4.5 / §4.7 / §4.8）
  #
  # 共用慣例：
  #   - namespace: power-shop
  #   - Admin endpoint：response 包裝 `{code: 'success', data: ...}`，使用 WPNonce
  #   - Partner endpoint（partner-auth/* + partner-reports/*）：
  #     **裸 payload**，不裹 `{code, data}`（spec §4.4）；
  #     使用 PartnerToken / PartnerBearer / PartnerCookie 三條路徑之一。
  #   - 錯誤回應一律走 ExceptionMapper（13 種對映 → ProfitShopExceptionError schema）。
  #   - partner-reports/* 的 partner_term_id **永不從 query string 讀取**，
  #     由 token 鎖死於 caller（防範 cross-partner 越權）。
  # ════════════════════════════════════════════════════════════════

  # ────────────────────────────
  # Profit Shop — Shops（§4.1）
  # ────────────────────────────

  /power-shop/profit-shops:
    get:
      tags:
        - ProfitShop
      summary: 查詢分潤賣場列表（Admin）
      operationId: listProfitShops
      security:
        - WPNonce: []
      parameters:
        - name: partner_term_id
          in: query
          description: 篩選特定 partner 的賣場（可選）
          schema:
            type: integer
      responses:
        '200':
          description: 賣場列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProfitShopOutput'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '500':
          description: 伺服器錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

    post:
      tags:
        - ProfitShop
      summary: 建立分潤賣場
      operationId: createProfitShop
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfitShopInput'
      responses:
        '201':
          description: 建立成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/ProfitShopOutput'
        '400':
          description: validation_failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '404':
          description: not_found（partner_term_id 不存在）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '409':
          description: slug_conflict（含 conflicts 陣列）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '500':
          description: 伺服器錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/profit-shops/validate-slug:
    get:
      tags:
        - ProfitShop
      summary: 驗證 slug 是否可用（Phase 3-E）
      description: |
        驗證指定 slug 是否可用，回傳 `available` 與所有衝突來源。
        檢查 5 類衝突（spec §6.11）：WordPress 保留字、站台核心 page slug、
        既有 powershop CPT slug、既有 profit_partner term slug、商品 / 分類 slug。
      operationId: validateProfitShopSlug
      security:
        - WPNonce: []
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 驗證結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/SlugValidationOutput'
        '400':
          description: validation_failed（slug 為空 / 格式錯誤）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/profit-shops/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: 賣場 ID
        schema:
          type: integer

    get:
      tags:
        - ProfitShop
      summary: 取得單一分潤賣場
      operationId: getProfitShop
      security:
        - WPNonce: []
      responses:
        '200':
          description: 賣場詳情
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/ProfitShopOutput'
        '404':
          description: not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

    put:
      tags:
        - ProfitShop
      summary: 更新分潤賣場
      operationId: updateProfitShop
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfitShopInput'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    $ref: '#/components/schemas/ProfitShopOutput'
        '400':
          description: validation_failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '404':
          description: not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '409':
          description: slug_conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'
        '422':
          description: invalid_state_transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

    delete:
      tags:
        - ProfitShop
      summary: 刪除分潤賣場（軟刪除 trash）
      operationId: deleteProfitShop
      security:
        - WPNonce: []
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      deleted:
                        type: boolean
        '404':
          description: not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitShopExceptionError'

  /power-shop/profit-shops/{id}/publish:
    post:
      tags:
        - ProfitShop
      summary: 上架分潤賣場
